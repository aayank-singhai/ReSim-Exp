model:
  model_dim: 256
  optimizer:
    class_path: torch.optim.AdamW
    init_args:
      lr: 1e-3
      weight_decay: 1e-2

data:
  batch_size: 32
  meta_file: /cpfs01/shared/opendrivelab/opendrivelab_hdd/yangjiazhi/GenADv3/carla_workspace/carla_0218_35k_new/meta.json

trainer:
  max_epochs: 100
  accelerator: gpu
  num_nodes: 1
  devices: 1
  strategy: ddp_find_unused_parameters_true
  precision: 16-mixed
  accumulate_grad_batches: 1
  gradient_clip_val: 1.0

  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        dirpath: exp_ckpts
        verbose: true
        save_last: true
        save_top_k: -1

  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: exp_logs
        name: reward
