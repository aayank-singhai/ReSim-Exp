args:
  latent_channels: 16
  mode: inference
  # load: "CogVideoX-2b-sat/transformer"
  # load: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/ckpts/CogVideoX-2b-sat/transformer"
  # load: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/sat/ckpts/cogvideox_2b_sft_nus_new-dataset_bs1_prefix_720x1280_slice_video_lr-2e-5-08-19-08-46"
  load: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/sat/ckpts/youtube_bs2_512x896_cond3_full_lr-5e-5_trunc-infer-8_32gpus_resume-09-05-03-45"

  batch_size: 1
  # input_type: txt
  input_type: dataset

  # input_file: test.txt
  # input_file: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/sat/configs/test.txt"
  # input_file: /cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/sat/ckpts/cogvideox_2b_sft_nus_new-dataset_bs1_prefix_720x1280_slice_video_lr-2e-5-08-19-08-46/video/latents
  # input_file: /cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/sat/ckpts/youtube_bs1_720x1280_cond3_full_lr-5e-5_trunc-infer-8_16gpus_finetune-09-02-17-11/video/latents

  # * Num of Latent frames
  sampling_num_frames: 13  # Must be 13, 11 or 9

  # sampling_fps: 8  # * Original
  # sampling_fps: 12  # * For nus
  sampling_fps: &fps 10  # * For youtube

  fp16: True
  output_dir: /cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/outputs/pred_debug2
  force_inference: True

  epochs: 1
  valid_data: ["/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/custom_data/youtube_json/YouTube_svd_val_clip-len-49_interval-10_78k_flow.json"]

  sampling_video_size: [512, 896]
  n_prediction_round: 2  # * Debug

data:
    target: data_video_custom.SFTDataset
    params:
      # video_size: [480, 720]
      video_size: [512, 896]

      fps: *fps  # TODO: Change to 10
      max_num_frames: 49
      skip_frms_num: 3.
      prefix_prompt: "This video depicts a realistic view from the driver's perspective of a car driving on the road."


model:
  scale_factor: 1.15258426
  disable_first_stage_autocast: true
  # not_trainable_prefixes: ['all'] ## Using Lora
  log_keys:
    - txt

  en_and_decode_n_samples_a_time: 1  # * split samples
  # en_and_decode_n_frames_a_time: 17  # * split frames
  # truncate_n_frames_decode: 8
  cond_inds: &cond_inds [0, 1, 2]
  denoiser_config:
    target: sgm.modules.diffusionmodules.denoiser.DiscreteDenoiser
    params:
      num_idx: 1000
      quantize_c_noise: False

      weighting_config:
        target: sgm.modules.diffusionmodules.denoiser_weighting.EpsWeighting
      scaling_config:
        target: sgm.modules.diffusionmodules.denoiser_scaling.VideoScaling
      discretization_config:
        target: sgm.modules.diffusionmodules.discretizer.ZeroSNRDDPMDiscretization
        params:
          shift_scale: 3.0

  network_config:
    target: dit_video_concat.DiffusionTransformer
    params:
      time_embed_dim: &t_emb_dim 512
      elementwise_affine: True
      num_frames: 49

      # num_frames: 65  # * weights not aligned

      time_compressed_rate: 4
      
      # * For (480, 720), originally supported
      # latent_width: 90
      # latent_height: 60


      # * Modify here according to the config
      # !!! DEBUG: For (512, 896)
      latent_width: 112
      latent_height: 64

      num_layers: 30
      patch_size: 2
      in_channels: 16
      out_channels: 16
      hidden_size: 1920
      adm_in_channels: 256
      num_attention_heads: 30

      transformer_args:
        vocab_size: 1
        max_sequence_length: 64
        layernorm_order: pre
        skip_init: false
        model_parallel_size: 1
        is_decoder: false

      modules:
        pos_embed_config:
          target: dit_video_concat.Basic3DPositionEmbeddingMixin
          params:
            text_length: 226
            # height_interpolation: 1.875  # * cur_height // 256
            # width_interpolation: 1.875   # * cur_width  // 384

            # !!! DEBUG: For (512, 896) 
            height_interpolation: 2.0   # * cur_height // 256
            width_interpolation:  2.3333   # * cur_width  // 384

        # lora_config: ## Using Lora
        #   target: sat.model.finetune.lora2.LoraMixin
        #   params:
        #     r: 128

        patch_embed_config:
          target: dit_video_concat.ImagePatchEmbeddingMixin
          params:
            text_hidden_size: 4096
            cond_emb_in_dim: *t_emb_dim

        adaln_layer_config:
          target: dit_video_concat.AdaLNMixin
          params:
            qk_ln: True

        final_layer_config:
          target: dit_video_concat.FinalLayerMixin

  conditioner_config:
    target: sgm.modules.GeneralConditioner
    params:
      emb_models:
        - is_trainable: false
          input_key: txt
          ucg_rate: 0.1
          target: sgm.modules.encoders.modules.FrozenT5Embedder
          params:
            model_dir: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/ckpts/CogVideoX-2b-sat/t5-v1_1-xxl"
            max_length: 226

  first_stage_config:
    target: vae_modules.autoencoder.VideoAutoencoderInferenceWrapper
    params:
      cp_size: 1
      ckpt_path: "/cpfs01/user/yangjiazhi/workspace/DVGen/CogVideo/ckpts/CogVideoX-2b-sat/vae/3d-vae.pt"
      ignore_keys: [ 'loss' ]

      loss_config:
        target: torch.nn.Identity

      regularizer_config:
        target: vae_modules.regularizers.DiagonalGaussianRegularizer

      encoder_config:
        target: vae_modules.cp_enc_dec.ContextParallelEncoder3D
        params:
          double_z: true
          z_channels: 16
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult: [ 1, 2, 2, 4 ]
          attn_resolutions: [ ]
          num_res_blocks: 3
          dropout: 0.0
          gather_norm: True

      decoder_config:
        target: vae_modules.cp_enc_dec.ContextParallelDecoder3D
        params:
          double_z: True
          z_channels: 16
          resolution: 256
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult: [ 1, 2, 2, 4 ]
          attn_resolutions: [ ]
          num_res_blocks: 3
          dropout: 0.0
          gather_norm: false

  loss_fn_config:
    target: sgm.modules.diffusionmodules.loss.VideoDiffusionLoss
    params:
      offset_noise_level: 0
      cond_inds: *cond_inds
      sigma_sampler_config:
        target: sgm.modules.diffusionmodules.sigma_sampling.DiscreteSampling
        params:
          uniform_sampling: True
          num_idx: 1000
          discretization_config:
            target: sgm.modules.diffusionmodules.discretizer.ZeroSNRDDPMDiscretization
            params:
              shift_scale: 3.0

  sampler_config:
    target: sgm.modules.diffusionmodules.sampling.VPSDEDPMPP2MSampler
    params:
      num_steps: 50
      verbose: True
      fixed_frames: 3  # [0, 1, 2]
      cond_inds: *cond_inds

      discretization_config:
        target: sgm.modules.diffusionmodules.discretizer.ZeroSNRDDPMDiscretization
        params:
          shift_scale: 3.0

      guider_config:
        target: sgm.modules.diffusionmodules.guiders.DynamicCFG
        params:
          scale: 6
          exp: 5
          num_steps: 50